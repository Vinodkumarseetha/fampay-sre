version: "3.9"

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  prometheus_data: {}
  grafana_data: {}

services:

  hodor:
    build:
      context: ./hodor
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "${BUILD_VERSION:-dev}"
    image: fampay/hodor:${TAG:-latest}
    restart: unless-stopped
    networks:
      - public
    environment:
      PORT: "8080"
      APP_ENV: "${APP_ENV:-production}"
      APP_VERSION: "${APP_VERSION:-1.0.0}"
      HODOR_SECRET_KEY: "hodorsecretkey1234567890abcdefghijklmnop"

    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  bran:
    build:
      context: ./bran
      dockerfile: Dockerfile
    image: fampay/bran:${TAG:-latest}
    restart: unless-stopped
    networks:
      - public
      - internal
    environment:
      DJANGO_SETTINGS_MODULE: bran.settings
      DJANGO_SECRET_KEY: "supersecretkey1234567890abcdefghijklmnopqrstuvwxyz"
      APP_ENV: "${APP_ENV:-production}"
      APP_VERSION: "${APP_VERSION:-1.0.0}"
      HODOR_INTERNAL_URL: "http://hodor:8080"
      ALLOWED_HOSTS: "*"
      GUNICORN_WORKERS: "4"
      GUNICORN_THREADS: "2"

    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: fampay/nginx:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - public
    depends_on:
      - hodor          # ← simple depends_on, no condition
      - bran  


  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - public
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.3
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - public
    ports:
      - "3000:3000"
    depends_on:
      - prometheus