apiVersion: v1
kind: Service
metadata:
  name: bran-service
  labels:
    app: bran
spec:
  selector:
    app: bran
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bran-config
data:
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  HODOR_INTERNAL_URL: "http://hodor-service:8080"
  ALLOWED_HOSTS: "*"
---
apiVersion: v1
kind: Secret
metadata:
  name: bran-secrets
type: Opaque
stringData:
  django_secret_key: "REPLACE_WITH_REAL_SECRET_VIA_CI"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bran-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bran
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bran-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bran
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
