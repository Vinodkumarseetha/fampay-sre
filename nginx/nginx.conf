upstream hodor_backend {
    least_conn;
    server hodor:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream bran_backend {
    least_conn;
    server bran:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Access log in JSON format
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Health check for nginx itself
    location /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Route: /hodor/* → hodor service ──────────────────────────────────────
    location /hodor/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://hodor_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Retry on failure
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── Route: /bran/* → bran service ────────────────────────────────────────
    location /bran/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://bran_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # Default - 404
    location / {
        return 404 '{"error":"not found","hint":"use /hodor/ or /bran/"}';
        add_header Content-Type application/json;
    }
}
